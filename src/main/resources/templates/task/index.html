<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Todo Application - Tasks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .task-done { text-decoration: line-through; color: #6c757d; }
    </style>
</head>
<body class="bg-light">

<div class="container py-5" style="max-width: 700px;">
    <h1 class="mb-4">Todo Application - Tasks</h1>

    <h3 th:text="${appName}"> - Live! </h3>

    <!-- Add Task -->
    <form action="/" method="post" class="input-group mb-4">
        <input type="text" name="title" class="form-control" placeholder="Enter task title" required>
        <button type="submit" class="btn btn-primary">Add Task</button>
    </form>

    <!-- Task List -->
    <ul class="list-group">
        <li th:each="task : ${tasks}"
            class="list-group-item d-flex justify-content-between align-items-center">

            <div>
                <span th:text="${task.title}" th:classappend="${task.completed} ? 'task-done' : ''"></span>
                <span th:if="${task.completed}" class="badge bg-success ms-2">Done</span>
                <span th:unless="${task.completed}" class="badge bg-secondary ms-2">Pending</span>
            </div>

            <div class="btn-group btn-group-sm" role="group">
                <!-- Toggle complete -->
                <form th:action="@{/{id}/toggle(id=${task.id})}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-outline-success"
                            th:text="${task.completed} ? 'Undo' : 'Complete'"></button>
                </form>

                <!-- Edit (opens modal) -->
                <button type="button" class="btn btn-outline-primary"
                        data-bs-toggle="modal"
                        th:data-bs-target="'#editModal' + ${task.id}">
                    Edit
                </button>

                <!-- Delete -->
                <form th:action="@{/{id}/delete(id=${task.id})}" method="post" class="d-inline"
                      onsubmit="return confirm('Delete this task?');">
                    <button type="submit" class="btn btn-outline-danger">Delete</button>
                </form>
            </div>

            <!-- Edit Modal -->
            <div class="modal fade" th:id="'editModal' + ${task.id}" tabindex="-1">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <form th:action="@{/{id}/update(id=${task.id})}" method="post">
                            <div class="modal-header">
                                <h5 class="modal-title">Edit Task</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                <input type="text" name="title" class="form-control"
                                       th:value="${task.title}" required>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                                <button type="submit" class="btn btn-primary">Save</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

        </li>
    </ul>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
